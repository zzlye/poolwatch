<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>号池监控浏览器助手设置</title>
    <style>
      body { margin: 0; background: #f4f6f5; color: #17211d; font: 16px/1.6 system-ui, sans-serif; }
      main { max-width: 720px; margin: 48px auto; padding: 28px; background: #fff; border: 1px solid #d8dfdb; border-radius: 12px; }
      h1 { margin-top: 0; font-size: 26px; }
      textarea { box-sizing: border-box; width: 100%; min-height: 180px; padding: 12px; border: 1px solid #aeb9b3; border-radius: 8px; font: inherit; }
      button { min-height: 44px; margin-top: 16px; padding: 0 20px; border: 0; border-radius: 8px; background: #147a55; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
      #status { min-height: 24px; color: #147a55; }
      small { color: #5c6963; }
    </style>
  </head>
  <body>
    <main>
      <h1>号池监控浏览器助手</h1>
      <p>每行填写一个可信的号池监控地址。浏览器助手只响应这些页面发起的一键读取操作。</p>
      <label for="origins"><strong>可信地址</strong></label>
      <textarea id="origins" spellcheck="false"></textarea>
      <small>只填写地址来源，例如 https://jiance.zzlye.xyz，不包含后续路径。公网地址需使用 HTTPS，第一行作为助手图标默认打开页面。</small>
      <div><button id="save" type="button">保存设置</button></div>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
